<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F9F9F7"/>
      <stop offset="1" stop-color="#F4F4F2"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15803D" stop-opacity=".08"/>
      <stop offset="1" stop-color="#15803D" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1000" cy="100" r="320" fill="url(#glow)"/>

  <!-- Logo -->
  <g transform="translate(80, 80)">
    <rect x="0"  y="28" width="8" height="16" rx="2" fill="#15803D"/>
    <rect x="12" y="20" width="8" height="24" rx="2" fill="#15803D"/>
    <rect x="24" y="12" width="8" height="32" rx="2" fill="#15803D"/>
    <rect x="36" y="4"  width="4" height="40" rx="2" fill="#15803D" opacity=".55"/>
    <text x="52" y="38" font-family="Inter, Geist, sans-serif" font-size="28" font-weight="600" fill="#0A0A0A" letter-spacing="-.5">MarginOS</text>
  </g>

  <!-- Kicker -->
  <text x="80" y="240" font-family="ui-monospace, Menlo, monospace" font-size="20" fill="#525252" letter-spacing="3">MARGINOS · THE HOSPITALITY OS</text>

  <!-- Headline -->
  <g font-family="Inter, Geist, sans-serif" fill="#0A0A0A" font-weight="600" letter-spacing="-1.5">
    <text x="80" y="320" font-size="68">Your suppliers charged you</text>
    <text x="80" y="400" font-size="68">more than they should have</text>
    <text x="80" y="480" font-size="68">this week.</text>
  </g>

  <!-- Sub -->
  <text x="80" y="550" font-family="Inter, Geist, sans-serif" font-size="26" fill="#525252" font-weight="500">MarginOS shows you exactly how much — before you click Approve.</text>

  <!-- Domain -->
  <text x="1120" y="590" text-anchor="end" font-family="ui-monospace, Menlo, monospace" font-size="18" fill="#737373">margin.work</text>
</svg>
